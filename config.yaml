# Configuración del organizador de fotos

# Extensiones de imagen soportadas
extensions:
  - .jpg
  - .jpeg
  - .png
  - .heic
  - .tiff
  - .tif
  - .bmp
  - .gif
  - .webp
  - .cr2
  - .nef
  - .arw

# Categorías temáticas y palabras clave que CLIP buscará.
# IMPORTANTE: Viajes NO está aquí — solo se asigna por GPS o nombre de carpeta.
# CLIP se usa para distinguir entre Personas, Familia, Naturaleza, Eventos, etc.
categories:
  Personas:
    - "portrait of a person facing the camera"
    - "group of people posing for a photo"
    - "selfie photo"
    - "person smiling at camera"
    - "friends together photo"
  Familia:
    - "family photo indoors"
    - "parents and children together"
    - "baby or toddler photo"
    - "grandparents with grandchildren"
    - "family reunion indoors"
  Naturaleza:
    - "nature landscape no people"
    - "forest and trees"
    - "flowers in a garden"
    - "sunset or sunrise sky"
    - "beach and ocean waves"
    - "mountain landscape"
    - "river or lake landscape"
    - "rural countryside"
  Animales:
    - "pet dog or cat"
    - "domestic animal"
    - "wild animal in nature"
    - "bird in nature"
    - "farm animal"
  Comida:
    - "food on a plate"
    - "restaurant meal"
    - "home cooked food"
    - "dessert or cake"
  Eventos:
    - "birthday party with cake and candles"
    - "wedding ceremony bride and groom"
    - "graduation ceremony"
    - "concert or live music crowd"
    - "celebration party indoors"
    - "christmas decoration"
    - "communion or baptism ceremony"
  Urbano:
    - "city street with buildings"
    - "urban cityscape architecture"
    - "bridge over river in city"
    - "city buildings and streets"
    - "town square plaza"
    - "aerial view of city"
    - "city skyline buildings"
    - "urban neighborhood street"
    - "city park urban"
    - "river through city with bridges"
    - "old town historic buildings"
    - "city waterfront promenade"
  Documentos:
    - "document or paper with text"
    - "screenshot of a screen"
    - "whiteboard with writing"
    - "receipt or invoice"

# Carpeta para fotos sin categoría clara
fallback_category: Sin_clasificar

# Carpeta para duplicados detectados
duplicates_folder: _Duplicados

# Umbral de similitud para duplicados (0-64, menor = más estricto)
# 0 = idénticos, 10 = muy similares, 20 = similares
duplicate_threshold: 10

# Si true, copia también los duplicados a _Duplicados para revisión
copy_duplicates: true

# Año fallback si la foto no tiene fecha EXIF ni de archivo válida
fallback_year: Sin_fecha
